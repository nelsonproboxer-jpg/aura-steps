<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Bag — Aura Steps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="cart">

  <header class="site-header" id="siteHeader"></header>

  <div class="container page-head">
    <p class="eyebrow">Your selection</p>
    <h1>Shopping Bag</h1>
  </div>

  <section class="section container" style="padding-top: 2rem;">
    <div class="empty-state" id="cartEmpty" hidden>
      <p>Your bag is waiting to be adorned.</p>
      <a href="shop.html" class="btn btn-primary">Explore the collection <span data-icon="arrow"></span></a>
    </div>

    <div class="cart-grid">
      <div id="cartList"></div>
      <aside class="summary-card" id="cartSummary" hidden>
        <h3>Order Summary</h3>
        <div class="summary-line"><span>Subtotal</span><span id="sumSubtotal"></span></div>
        <div class="summary-line"><span>Shipping</span><span id="sumShipping"></span></div>
        <div class="summary-line total"><span>Total</span><span id="sumTotal"></span></div>
        <p class="summary-note">Complimentary shipping over $500 · Taxes calculated at checkout</p>
        <a href="checkout.html" class="btn btn-primary btn-block">Checkout <span data-icon="arrow"></span></a>
      </aside>
    </div>
  </section>

  <footer class="site-footer" id="siteFooter"></footer>

  <script src="assets/data.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
