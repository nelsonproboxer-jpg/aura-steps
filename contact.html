<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Aura Steps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="contact">

  <header class="site-header" id="siteHeader"></header>

  <div class="container page-head">
    <p class="eyebrow">We're listening</p>
    <h1>Contact Us</h1>
    <p class="section-sub">Sizing question, order update or a style you're dreaming of — write to us and we'll reply within one business day.</p>
  </div>

  <section class="section container" style="max-width: 640px; padding-top: 2rem;">
    <form class="checkout-form" id="contactForm">
      <div class="field-row">
        <input type="text" placeholder="Your name" autocomplete="name" required />
        <input type="email" placeholder="Email address" autocomplete="email" required />
      </div>
      <input type="text" placeholder="Subject" required />
      <textarea placeholder="Your message…" rows="6" required></textarea>
      <button type="submit" class="btn btn-primary">Send Message <span data-icon="arrow"></span></button>
    </form>
  </section>

  <footer class="site-footer" id="siteFooter"></footer>

  <script src="assets/data.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
